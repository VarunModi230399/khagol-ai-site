<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!--
    KHAGOL AI — Icon Mark
    Transparent background, no text.
    Pixel-traced from original logo.
    Two crossed ellipses (atom symbol), ~±32° tilt
    Navy: #1B2A5E  |  Teal: #2EC9A7
  -->

  <!-- ══════════════════════════════════════════
       RING 1 — tilted ~+32° (bottom-left to top-right)
       ══════════════════════════════════════════ -->
  <ellipse
    cx="120" cy="120"
    rx="96" ry="30"
    fill="none"
    stroke="#1B2A5E"
    stroke-width="6"
    transform="rotate(32 120 120)"
  />

  <!-- ══════════════════════════════════════════
       RING 2 — tilted ~−32° (top-left to bottom-right)
       ══════════════════════════════════════════ -->
  <ellipse
    cx="120" cy="120"
    rx="96" ry="30"
    fill="none"
    stroke="#1B2A5E"
    stroke-width="6"
    transform="rotate(-32 120 120)"
  />

  <!-- ══════════════════════════════════════════
       VERTICAL STEM connecting the three nodes
       ══════════════════════════════════════════ -->
  <line
    x1="120" y1="30"
    x2="120" y2="210"
    stroke="#1B2A5E"
    stroke-width="6"
    stroke-linecap="round"
  />

  <!-- ══════════════════════════════════════════
       NODES
       ══════════════════════════════════════════ -->

  <!-- Top node -->
  <circle cx="120" cy="33"  r="14" fill="#1B2A5E" />

  <!-- Center node (slightly larger) -->
  <circle cx="120" cy="120" r="17" fill="#1B2A5E" />

  <!-- Bottom node -->
  <circle cx="120" cy="207" r="14" fill="#1B2A5E" />

  <!-- ══════════════════════════════════════════
       TEAL ACCENT DOT — right side, upper orbit
       ══════════════════════════════════════════ -->
  <circle cx="185" cy="89"  r="18" fill="#2EC9A7" />

</svg>
